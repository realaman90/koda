name: distribution-parity-gate

on:
  pull_request:
    paths:
      - 'src/lib/distribution/**'
      - 'src/lib/config/**'
      - 'src/lib/auth/**'
      - 'src/app/api/config/**'
      - 'src/app/api/health/**'
      - 'src/app/api/plugins/**'
      - 'src/middleware.ts'
      - 'src/lib/ci/**'
      - '.github/workflows/distribution-parity-gate.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    tags:
      - '*rc*'
  workflow_dispatch:
    inputs:
      release_candidate:
        description: 'Generate parity artifact for release candidate run'
        type: boolean
        default: false

jobs:
  profile-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [oss, hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Configure OSS profile env
        if: matrix.profile == 'oss'
        run: |
          cat <<'EOF' >> "$GITHUB_ENV"
          KODA_DISTRIBUTION=oss
          NEXT_PUBLIC_KODA_DISTRIBUTION=oss
          AUTH_V1=false
          SANDBOX_PROVIDER=docker
          ASSET_STORAGE=local
          SNAPSHOT_STORAGE=local
          NEXT_PUBLIC_STORAGE_BACKEND=sqlite
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY=sk_test_ci_oss
          EOF

      - name: Configure Hosted profile env
        if: matrix.profile == 'hosted'
        run: |
          cat <<'EOF' >> "$GITHUB_ENV"
          KODA_DISTRIBUTION=hosted
          NEXT_PUBLIC_KODA_DISTRIBUTION=hosted
          AUTH_V1=false
          SANDBOX_PROVIDER=e2b
          E2B_API_KEY=ci_dummy_key
          E2B_TEMPLATE_ID=ci_dummy_template
          TURSO_DATABASE_URL=libsql://ci-hosted.turso.io
          TURSO_AUTH_TOKEN=ci_dummy_turso_token
          ASSET_STORAGE=r2
          SNAPSHOT_STORAGE=r2
          R2_ACCOUNT_ID=ci_dummy_account
          R2_ACCESS_KEY_ID=ci_dummy_access
          R2_SECRET_ACCESS_KEY=ci_dummy_secret
          R2_BUCKET_NAME=ci-dummy-bucket
          NEXT_PUBLIC_STORAGE_BACKEND=turso
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY=sk_test_ci_hosted
          EOF

      - name: Validate distribution contract
        run: npm run validate:distribution-contract

      - name: Build
        run: npm run build

      - name: Startup + health + smoke API
        run: npm run ci:smoke-profile -- --profile ${{ matrix.profile }} --port 4100 --report reports/ci-parity/${{ matrix.profile }}.json

      - name: Upload profile report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-report-${{ matrix.profile }}
          path: reports/ci-parity/${{ matrix.profile }}.json

  parity-artifact:
    if: ${{ (github.event_name == 'push' && contains(github.ref_name, 'rc')) || (github.event_name == 'workflow_dispatch' && inputs.release_candidate) }}
    needs: profile-check
    runs-on: ubuntu-latest
    steps:
      - name: Download profile reports
        uses: actions/download-artifact@v4
        with:
          path: reports/ci-parity

      - name: Build parity summary
        run: |
          mkdir -p reports/ci-parity
          OSS_REPORT="reports/ci-parity/profile-report-oss/oss.json"
          HOSTED_REPORT="reports/ci-parity/profile-report-hosted/hosted.json"

          if [ ! -f "$OSS_REPORT" ] || [ ! -f "$HOSTED_REPORT" ]; then
            echo "Missing profile report artifact(s)." >&2
            exit 1
          fi

          jq -n \
            --slurpfile oss "$OSS_REPORT" \
            --slurpfile hosted "$HOSTED_REPORT" \
            --arg run_id "${{ github.run_id }}" \
            --arg ref "${{ github.ref_name }}" \
            '{
              generatedAt: now | todate,
              runId: $run_id,
              ref: $ref,
              profiles: {
                oss: $oss[0],
                hosted: $hosted[0]
              },
              parity: {
                startup: ($oss[0].checks.startup == "pass" and $hosted[0].checks.startup == "pass"),
                health: ($oss[0].checks.health == "pass" and $hosted[0].checks.health == "pass"),
                apiConfig: ($oss[0].checks.apiConfig == "pass" and $hosted[0].checks.apiConfig == "pass")
              }
            }' > reports/ci-parity/parity-report.json

      - name: Upload parity report artifact
        uses: actions/upload-artifact@v4
        with:
          name: distribution-parity-report
          path: reports/ci-parity/parity-report.json
