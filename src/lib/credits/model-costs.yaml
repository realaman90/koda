# Koda Model Cost Configuration
# fal_cost: actual fal.ai API cost per generation (USD)
# credits: what we charge (auto-calculated: ceil(fal_cost * 30), i.e. 3x markup)
# For per-second models, fal_cost is for base duration (5s). Scales linearly with duration.
# Seedance 2.0 uses xskill (currently free) — assigned nominal credits until moved to fal.

markup_multiplier: 30  # ceil(fal_cost * this) = credits

plans:
  free_user:
    credits_per_month: 30
  basic_user:
    credits_per_month: 100
  pro_user:
    credits_per_month: 300
  pro_plus_user:
    credits_per_month: 800

